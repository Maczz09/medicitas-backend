events { worker_connections 1024; }

http {
  upstream backend {
    server backend:3000;
  }

  limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

  # ─── Seguridad (Mitigación OWASP ZAP) ───
  server_tokens off; # Oculta la versión de Nginx (Soluciona 10036 y 10009)

  server {
    listen 80;

    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline';" always; # Soluciona 10038
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always; # Soluciona 10063
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Inyección de correlationId si no viene
    add_header X-Correlation-Id $request_id always;

    location /api/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Correlation-Id $request_id;
      proxy_set_header Authorization $http_authorization;

      # Rate limiting básico
      limit_req zone=api burst=50 nodelay;
    }

    # Webhooks externos (Twilio, etc.) — sin rate limit
    location /webhooks/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Swagger UI
    location /api-docs/ {
      proxy_pass http://backend;
      proxy_set_header Host $host;
    }
  }
}
